name: Refresh Car Shows

on:
  schedule:
    - cron: "0 8 * * 0"  # Every Sunday 8am UTC
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: pip install httpx

      - name: Fetch car shows from Eventbrite
        env:
          EVENTBRITE_TOKEN: ${{ secrets.EVENTBRITE_TOKEN }}
        run: |
          python3 << 'EOF'
          import httpx, json, sys, time

          TOKEN = "${{ secrets.EVENTBRITE_TOKEN }}"
          BASE_URL = "https://www.eventbriteapi.com/v3"

          # Major US cities spread across the country for nationwide coverage
          CITIES = [
            ("Seattle",      47.6062, -122.3321),
            ("San Francisco",37.7749, -122.4194),
            ("Los Angeles",  34.0522, -118.2437),
            ("Phoenix",      33.4484, -112.0740),
            ("Denver",       39.7392, -104.9903),
            ("Dallas",       32.7767,  -96.7970),
            ("Houston",      29.7604,  -95.3698),
            ("Minneapolis",  44.9778,  -93.2650),
            ("Chicago",      41.8781,  -87.6298),
            ("Detroit",      42.3314,  -83.0458),
            ("Atlanta",      33.7490,  -84.3880),
            ("Miami",        25.7617,  -80.1918),
            ("New York",     40.7128,  -74.0060),
            ("Boston",       42.3601,  -71.0589),
            ("Charlotte",    35.2271,  -80.8431),
          ]

          shows = {}

          with httpx.Client(timeout=20, headers={"Authorization": f"Bearer {TOKEN}"}) as client:
            for city, lat, lng in CITIES:
              page = 1
              while page <= 5:
                resp = client.get(f"{BASE_URL}/events/search/", params={
                  "q": "car show",
                  "location.latitude": lat,
                  "location.longitude": lng,
                  "location.within": "200mi",
                  "expand": "venue",
                  "page": page,
                })
                if resp.status_code == 401:
                  print("ERROR: Invalid Eventbrite token")
                  sys.exit(1)
                if not resp.is_success:
                  print(f"  {city} page {page}: HTTP {resp.status_code} — stopping")
                  break
                data = resp.json()
                events = data.get("events", [])
                print(f"  {city} page {page}: {len(events)} events")
                for event in events:
                  eid = event.get("id")
                  if not eid or eid in shows:
                    continue
                  venue = event.get("venue") or {}
                  address = venue.get("address") or {}
                  vlat = venue.get("latitude")
                  vlng = venue.get("longitude")
                  shows[eid] = {
                    "eventbrite_id": eid,
                    "name": event["name"]["text"],
                    "date": event["start"]["local"],
                    "url": event["url"],
                    "venue": address.get("localized_address_display"),
                    "lat": float(vlat) if vlat else None,
                    "lng": float(vlng) if vlng else None,
                  }
                pagination = data.get("pagination", {})
                if page >= pagination.get("page_count", 1):
                  break
                page += 1
                time.sleep(0.5)

          result = list(shows.values())
          print(f"\nTotal unique shows: {len(result)}")
          if not result:
            print("ERROR: No shows fetched — aborting")
            sys.exit(1)
          with open("shows.json", "w") as f:
            json.dump(result, f)
          EOF

      - name: Load shows into MongoDB
        env:
          APP_URL: ${{ secrets.CARSHOW_APP_URL }}
          SHOWS_API_KEY: ${{ secrets.SHOWS_API_KEY }}
        run: |
          python3 << 'EOF'
          import httpx, json, os

          with open("shows.json") as f:
            shows = json.load(f)

          r = httpx.post(
            f"{os.environ['APP_URL']}/admin/shows/load",
            json=shows,
            headers={"x-api-key": os.environ["SHOWS_API_KEY"]},
            timeout=60,
          )
          r.raise_for_status()
          print("Loaded:", r.json())
          EOF
