name: Refresh Car Shows

on:
  schedule:
    - cron: "0 8 * * 0"  # Every Sunday 8am UTC
  workflow_dispatch:

jobs:
  refresh:
    # NOTE: carcruisefinder.com blocks datacenter/GitHub Actions IPs (Cloudflare 403).
    # Run scripts/scrape.py manually from a home machine instead:
    #   python3 scripts/scrape.py --states AL AK AZ ... --api http://35.229.88.234
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install httpx

      - name: Scrape car shows
        env:
          API_URL: ${{ secrets.CARSHOW_APP_URL }}
        continue-on-error: true
        run: |
          python3 scripts/scrape.py \
            --states AL AK AZ AR CA CO CT DE FL GA HI ID IL IN IA KS KY LA ME MD MA MI MN MS MO MT NE NV NH NJ NM NY NC ND OH OK OR PA RI SC SD TN TX UT VT VA WA WV WI WY \
            --api "$API_URL"
