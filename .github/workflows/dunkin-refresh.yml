name: Refresh Dunkin Locations

on:
  schedule:
    - cron: "0 7 * * 0"  # Every Sunday 7am UTC
  workflow_dispatch:      # Allow manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: pip install httpx duckdb

      - name: Fetch Dunkin locations from Overture Maps
        run: |
          python3 << 'EOF'
          import duckdb, json, sys, subprocess, re

          # Discover the latest Overture Maps release from the public S3 bucket
          result = subprocess.run(
              ["aws", "s3", "ls", "s3://overturemaps-us-west-2/release/", "--no-sign-request"],
              capture_output=True, text=True,
          )
          releases = sorted(re.findall(r"(\d{4}-\d{2}-\d{2}\.\d+)/", result.stdout))
          if not releases:
              print("ERROR: Could not discover Overture Maps releases")
              print(result.stdout, result.stderr)
              sys.exit(1)
          latest = releases[-1]
          print(f"Using Overture Maps release: {latest}")

          con = duckdb.connect()
          con.execute("INSTALL httpfs; LOAD httpfs; INSTALL spatial; LOAD spatial;")
          con.execute("SET s3_region='us-west-2';")

          path = f"s3://overturemaps-us-west-2/release/{latest}/theme=places/type=place/*"
          print(f"Querying: {path}")

          rows = con.execute(f"""
              SELECT
                  id,
                  names.primary                       AS name,
                  COALESCE(addresses[1].freeform, '') AS address,
                  ST_Y(ST_GeomFromWKB(geometry))      AS lat,
                  ST_X(ST_GeomFromWKB(geometry))      AS lng
              FROM read_parquet('{path}', hive_partitioning=1)
              WHERE bbox.xmin BETWEEN -180 AND -60
                AND bbox.ymin BETWEEN  18  AND  72
                AND names.primary ILIKE '%dunkin%'
          """).fetchall()

          locations = []
          for row_id, name, address, lat, lng in rows:
              if lat is None or lng is None:
                  continue
              locations.append({
                  "osm_id": row_id,
                  "osm_type": "overture",
                  "name": name or "Dunkin'",
                  "address": address or "",
                  "lat": lat,
                  "lng": lng,
              })

          print(f"Found {len(locations)} Dunkin locations")
          if not locations:
              print("ERROR: No locations found — aborting")
              sys.exit(1)

          with open("dunkin_locations.json", "w") as f:
              json.dump(locations, f)
          EOF

      - name: Push to app
        env:
          APP_URL: ${{ secrets.CARSHOW_APP_URL }}
          DUNKIN_API_KEY: ${{ secrets.DUNKIN_API_KEY }}
        run: |
          python3 << 'EOF'
          import httpx, json, os

          with open("dunkin_locations.json") as f:
              locations = json.load(f)

          r = httpx.post(
            f"{os.environ['APP_URL']}/dunkin/load",
            json=locations,
            headers={"x-api-key": os.environ["DUNKIN_API_KEY"]},
            timeout=60,
          )
          r.raise_for_status()
          print("Seeded:", r.json())
          EOF
