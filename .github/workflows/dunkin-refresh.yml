name: Refresh Dunkin Locations

on:
  schedule:
    - cron: "0 7 * * 0"  # Every Sunday 7am UTC
  workflow_dispatch:      # Allow manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: pip install httpx

      - name: Fetch Dunkin locations from Overpass
        run: |
          python3 << 'EOF'
          import httpx, json, sys, time

          # 8×5 grid (8°lon × 5°lat) + AK split into 2 + HI = 43 queries
          US_BBOXES = []
          for row in range(5):
              s = 24.0 + row * 5.0
              n = s + 5.0
              for col in range(8):
                  w = -125.0 + col * 8.0
                  e = w + 8.0
                  US_BBOXES.append(f"{s},{w},{n},{e}")
          US_BBOXES += [
              "54.0,-179.0,72.0,-141.0",
              "54.0,-141.0,72.0,-129.0",
              "18.0,-161.0,23.0,-154.0",
          ]

          ENDPOINTS = [
            "https://overpass-api.de/api/interpreter",
            "https://overpass.kumi.systems/api/interpreter",
          ]

          locations = []
          seen = set()

          for bbox in US_BBOXES:
              query = (
                f"[out:json][timeout:45];"
                f"(node[\"name\"~\"Dunkin\",i]({bbox});"
                f"way[\"name\"~\"Dunkin\",i]({bbox}););"
                f"out center;"
              )
              fetched = False
              for url in ENDPOINTS:
                  try:
                      print(f"  Querying {url} bbox={bbox}...")
                      r = httpx.get(url, params={"data": query},
                                    headers={"User-Agent": "carshow-finder/1.0"}, timeout=60)
                      r.raise_for_status()
                      elements = r.json().get("elements", [])
                      for el in elements:
                          lat = el.get("lat") or (el.get("center") or {}).get("lat")
                          lon = el.get("lon") or (el.get("center") or {}).get("lon")
                          if not lat or not lon:
                              continue
                          key = f"{lat:.5f},{lon:.5f}"
                          if key in seen:
                              continue
                          seen.add(key)
                          tags = el.get("tags", {})
                          locations.append({
                              "osm_id": el["id"],
                              "osm_type": el["type"],
                              "name": tags.get("name", "Dunkin'"),
                              "address": " ".join(filter(None, [
                                  tags.get("addr:housenumber"),
                                  tags.get("addr:street"),
                                  tags.get("addr:city"),
                                  tags.get("addr:state"),
                              ])),
                              "lat": lat,
                              "lng": lon,
                          })
                      print(f"  Got {len(elements)} elements (total unique: {len(locations)})")
                      fetched = True
                      break
                  except Exception as e:
                      print(f"  Error from {url}: {e}")
              if not fetched:
                  print(f"ERROR: All endpoints failed for bbox {bbox} — aborting")
                  sys.exit(1)
              time.sleep(1)  # be polite to Overpass

          print(f"Processed {len(locations)} unique locations")
          with open("dunkin_locations.json", "w") as f:
              json.dump(locations, f)
          EOF

      - name: Push to app
        env:
          APP_URL: ${{ secrets.CARSHOW_APP_URL }}
          DUNKIN_API_KEY: ${{ secrets.DUNKIN_API_KEY }}
        run: |
          python3 << 'EOF'
          import httpx, json, os

          with open("dunkin_locations.json") as f:
              locations = json.load(f)

          r = httpx.post(
            f"{os.environ['APP_URL']}/dunkin/load",
            json=locations,
            headers={"x-api-key": os.environ["DUNKIN_API_KEY"]},
            timeout=60,
          )
          r.raise_for_status()
          print("Seeded:", r.json())
          EOF
