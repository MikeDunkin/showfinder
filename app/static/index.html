<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Car Show Finder</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    #map { position: fixed; inset: 0; }

    #panel {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 1000;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      width: 280px;
      overflow: hidden;
    }

    #panel-header {
      background: #1a1a2e;
      color: #fff;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }

    #panel-toggle {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 12px;
      font-weight: 500;
      color: #fff;
      white-space: nowrap;
    }

    #panel-body.collapsed { display: none; }

    #panel-reopen {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 1000;
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      display: none;
    }

    #panel-body { padding: 14px; }

    #panel-body input[type="text"],
    #panel-body input[type="number"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .btn {
      width: 100%;
      padding: 9px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 6px;
    }
    .btn-primary { background: #1a73e8; color: #fff; }
    .btn-primary:hover { background: #1557b0; }
    .btn-gps { background: #34a853; color: #fff; }
    .btn-gps:hover { background: #2d9249; }

    #status {
      font-size: 12px;
      color: #666;
      margin-top: 8px;
      min-height: 18px;
    }

    .leaflet-popup-content strong { display: block; margin-bottom: 4px; font-size: 14px; }
    .leaflet-popup-content .meta { font-size: 12px; color: #555; margin-bottom: 6px; }
    .leaflet-popup-content .actions a {
      display: inline-block;
      margin-right: 8px;
      font-size: 12px;
      color: #1a73e8;
      text-decoration: none;
    }
    .leaflet-popup-content .actions a:hover { text-decoration: underline; }

    .car-marker {
      background: #1a1a2e;
      border: 2px solid #fff;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    }

    .coffee-marker {
      background: #ff6e00;
      border: 2px solid #fff;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    }

    .btn-dunkin { background: #ff6e00; color: #fff; }
    .btn-dunkin:hover { background: #e05e00; }
    .btn-dunkin.active { background: #a03e00; }

    .btn-shows { background: #1a1a2e; color: #fff; }
    .btn-shows:hover { background: #2d2d50; }
    .btn-shows.active { background: #555; }

    #search-area-btn {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      padding: 8px 20px;
      background: #fff;
      border: 2px solid #1a73e8;
      border-radius: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      color: #1a73e8;
      display: none;
      white-space: nowrap;
    }
    #search-area-btn:hover { background: #e8f0fe; }
  </style>
</head>
<body>
  <div id="map"></div>
  <button id="search-area-btn" onclick="searchArea()">🔍 Search this area</button>
  <button id="panel-reopen" onclick="togglePanel()">🚗 Menu ▼</button>
  <div id="panel">
    <div id="panel-header" onclick="togglePanel()">Car Show Finder <span id="panel-toggle">Hide ▲</span></div>
    <div id="panel-body">
      <input type="text" id="zip" placeholder="ZIP code" maxlength="10" />
      <input type="number" id="radius" value="25" min="5" max="100" placeholder="Radius (miles)" />
      <button class="btn btn-primary" onclick="searchByZip()">Search by ZIP</button>
      <button class="btn btn-gps" onclick="searchByGPS()">Use My Location</button>
      <button class="btn btn-shows active" id="shows-btn" onclick="toggleShows()">🚗 Hide Car Shows</button>
      <button class="btn btn-dunkin" id="dunkin-btn" onclick="toggleDunkin()">☕ Show Dunkin' Locations</button>
      <div id="status"></div>
    </div>
  </div>

  <script>
    const map = L.map('map').setView([39.5, -98.35], 4);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);

    let markers = [];
    let dunkinMarkers = [];
    let dunkinVisible = false;
    let showsVisible = true;
    let lastCenter = null;

    const coffeeIcon = L.divIcon({
      className: '',
      html: '<div class="coffee-marker">☕</div>',
      iconSize: [36, 36],
      iconAnchor: [18, 18],
      popupAnchor: [0, -20]
    });

    const carIcon = L.divIcon({
      className: '',
      html: '<div class="car-marker">🚗</div>',
      iconSize: [40, 40],
      iconAnchor: [20, 20],
      popupAnchor: [0, -22]
    });

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    function clearMarkers() {
      markers.forEach(m => map.removeLayer(m));
      markers = [];
    }

    function getMapRadius() {
      const center = map.getCenter();
      const ne = map.getBounds().getNorthEast();
      const distMeters = center.distanceTo(ne);
      return Math.max(5, Math.min(300, Math.round(distMeters / 1609.34)));
    }

    function displayShows(shows, centerLat, centerLng, recenter = true) {
      clearMarkers();
      if (recenter) map.setView([centerLat, centerLng], 10);

      if (shows.length === 0) {
        setStatus('No car shows found in this area.');
        return;
      }

      setStatus(`Found ${shows.length} car show(s).`);
      const bounds = [];

      shows.forEach(show => {
        const lat = show.lat ?? centerLat;
        const lng = show.lng ?? centerLng;
        bounds.push([lat, lng]);

        const date = show.date ? new Date(show.date).toLocaleDateString('en-US', {
          weekday: 'short', year: 'numeric', month: 'short', day: 'numeric'
        }) : 'Date TBD';

        const venue = show.venue || 'Venue TBD';
        const dirTarget = show.lat
          ? `${show.lat},${show.lng}`
          : encodeURIComponent(venue);
        const directionsUrl = `https://www.google.com/maps/dir/?api=1&destination=${dirTarget}`;

        const marker = L.marker([lat, lng], { icon: carIcon });
        if (showsVisible) marker.addTo(map);
        marker.bindPopup(`
          <strong>${show.name}</strong>
          <div class="meta">
            📅 ${date}<br>
            📍 ${venue}
          </div>
          <div class="actions">
            <a href="${directionsUrl}" target="_blank">🗺 Directions</a>
            <a href="${show.url}" target="_blank">🎟 Details</a>
          </div>
        `);
        markers.push(marker);
      });

      if (recenter && bounds.length > 1) {
        map.fitBounds(bounds, { padding: [40, 40] });
      }
    }

    function toggleShows() {
      const btn = document.getElementById('shows-btn');
      showsVisible = !showsVisible;
      if (showsVisible) {
        btn.classList.add('active');
        btn.textContent = '🚗 Hide Car Shows';
        markers.forEach(m => m.addTo(map));
      } else {
        btn.classList.remove('active');
        btn.textContent = '🚗 Show Car Shows';
        markers.forEach(m => map.removeLayer(m));
      }
    }

    async function getLocationByIP() {
      try {
        const ipRes = await fetch('https://api.ipify.org?format=json');
        const { ip } = await ipRes.json();
        const res = await fetch(`/location?ip=${ip}`);
        const data = await res.json();
        if (data.lat != null) return { lat: data.lat, lng: data.lng };
      } catch {}
      return null;
    }

    function clearDunkin() {
      dunkinMarkers.forEach(m => map.removeLayer(m));
      dunkinMarkers = [];
    }

    async function loadDunkin(lat, lng, radius) {
      clearDunkin();
      setStatus("Loading Dunkin' locations...");
      try {
        const res = await fetch(`/dunkin?lat=${lat}&lng=${lng}&radius=${radius}`);
        if (!res.ok) throw new Error(`Server returned ${res.status}`);
        const locations = await res.json();
        locations.forEach(loc => {
          const directionsUrl = `https://www.google.com/maps/dir/?api=1&destination=${loc.lat},${loc.lng}`;
          const marker = L.marker([loc.lat, loc.lng], { icon: coffeeIcon }).addTo(map);
          marker.bindPopup(`
            <strong>${loc.name}</strong>
            ${loc.address ? `<div class="meta">📍 ${loc.address}</div>` : ''}
            <div class="actions">
              <a href="${directionsUrl}" target="_blank">🗺 Directions</a>
            </div>
          `);
          dunkinMarkers.push(marker);
        });
        setStatus(dunkinMarkers.length
          ? `Found ${dunkinMarkers.length} Dunkin' location(s).`
          : "No Dunkin' locations found — data may not be loaded yet.");
      } catch (err) {
        setStatus(`Could not load Dunkin' locations: ${err.message}`);
      }
    }

    async function toggleDunkin() {
      const btn = document.getElementById('dunkin-btn');
      dunkinVisible = !dunkinVisible;
      if (dunkinVisible) {
        btn.classList.add('active');
        btn.textContent = "☕ Hide Dunkin' Locations";
        const center = map.getCenter();
        const radius = document.getElementById('radius').value;
        await loadDunkin(center.lat, center.lng, radius);
      } else {
        btn.classList.remove('active');
        btn.textContent = "☕ Show Dunkin' Locations";
        clearDunkin();
      }
    }

    async function doSearch(lat, lng, radius, recenter = true) {
      if (!radius) radius = parseInt(document.getElementById('radius').value) || 25;
      lastCenter = { lat, lng };
      suppressSearchBtn = true;
      document.getElementById('search-area-btn').style.display = 'none';
      setStatus('Searching for car shows...');
      try {
        const res = await fetch(`/shows?lat=${lat}&lng=${lng}&radius=${radius}`);
        if (!res.ok) { setStatus('API error — check server logs.'); return; }
        const shows = await res.json();
        displayShows(shows, lat, lng, recenter);
        if (dunkinVisible) await loadDunkin(lat, lng, radius);
      } catch {
        setStatus('Error fetching shows.');
      } finally {
        setTimeout(() => { suppressSearchBtn = false; }, 1000);
      }
    }

    async function searchArea() {
      const center = map.getCenter();
      const radius = getMapRadius();
      document.getElementById('radius').value = Math.min(100, radius);
      await doSearch(center.lat, center.lng, radius, false);
    }

    async function searchByGPS() {
      setStatus('Getting your location...');

      if (navigator.geolocation) {
        try {
          const pos = await new Promise((resolve, reject) =>
            navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 8000, maximumAge: 60000 })
          );
          return doSearch(pos.coords.latitude, pos.coords.longitude);
        } catch {}
      }

      setStatus('Using approximate IP location...');
      const coords = await getLocationByIP();
      if (coords) {
        await doSearch(coords.lat, coords.lng);
      } else {
        setStatus('Could not determine location. Try entering a ZIP code.');
      }
    }

    async function searchByZip() {
      const zip = document.getElementById('zip').value.trim();
      const radius = document.getElementById('radius').value;
      if (!zip) { setStatus('Please enter a ZIP code.'); return; }
      setStatus('Searching...');
      try {
        const res = await fetch(`/shows/by-zip?zip_code=${zip}&radius=${radius}`);
        if (!res.ok) { setStatus('Invalid ZIP code or API error.'); return; }
        const shows = await res.json();

        const geoRes = await fetch(
          `https://nominatim.openstreetmap.org/search?postalcode=${zip}&country=US&format=json&limit=1`,
          { headers: { 'User-Agent': 'carshow-finder/1.0' } }
        );
        const geo = await geoRes.json();
        if (geo.length > 0) {
          displayShows(shows, parseFloat(geo[0].lat), parseFloat(geo[0].lon));
        } else {
          setStatus('Could not resolve ZIP code.');
        }
      } catch {
        setStatus('Error fetching shows.');
      }
    }

    function togglePanel() {
      const body = document.getElementById('panel-body');
      const toggle = document.getElementById('panel-toggle');
      const panel = document.getElementById('panel');
      const reopen = document.getElementById('panel-reopen');
      const collapsed = body.classList.toggle('collapsed');
      toggle.textContent = collapsed ? 'Show ▼' : 'Hide ▲';
      panel.style.display = collapsed ? 'none' : '';
      reopen.style.display = collapsed ? '' : 'none';
    }

    let suppressSearchBtn = false;
    map.on('moveend', () => {
      if (!suppressSearchBtn) {
        document.getElementById('search-area-btn').style.display = 'block';
      }
    });

    searchByGPS();
  </script>
</body>
</html>
