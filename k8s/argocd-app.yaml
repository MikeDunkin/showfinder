apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: carshowfinder
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/MikeDunkin/showfinder
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: carshowfinder
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
