apiVersion: apps/v1
kind: Deployment
metadata:
  name: carshowfinder
  namespace: carshowfinder
spec:
  replicas: 1
  selector:
    matchLabels:
      app: carshowfinder
  template:
    metadata:
      labels:
        app: carshowfinder
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: carshowfinder
          image: us-east1-docker.pkg.dev/richkube-2026/testkube-images/carshowfinder:latest
          ports:
            - containerPort: 8000
          env:
            - name: MONGODB_URL
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: MONGODB_URL
            - name: DUNKIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: dunkin-api-secret
                  key: DUNKIN_API_KEY
            - name: SHOWS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: shows-api-secret
                  key: SHOWS_API_KEY
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: tmp
          emptyDir: {}
