apiVersion: batch/v1
kind: CronJob
metadata:
  name: dunkin-refresh
  namespace: carshowfinder
spec:
  schedule: "0 6 * * 0"  # Every Sunday at 6am UTC
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: dunkin-refresh
              image: curlimages/curl:latest
              command:
                - curl
                - -sf
                - -X
                - POST
                - http://carshowfinder/dunkin/refresh
                - --max-time
                - "150"
